<div class="post-card">
    <div class="post-info">
        <h3>{{ post?.name || 'Unknown' }}</h3>
        <small>{{ post?.content || 'Unknown' }}</small>
    </div>
    <div class="post-image-container">
        <img [src]="getImageUrl()" (error)="onImageError($event)" alt="Post image">
    </div>
</div>
