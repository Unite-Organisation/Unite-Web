<div class="post-container">
    <div class="button-container" *ngIf="canCreateAnnouncement">
        <add-button 
            (buttonClick)="openCreateAnnouncementDialog()">
            Add new announcement
        </add-button>
    </div>

    <div class="posts-list" *ngIf="posts.length > 0">
        <post-card *ngFor="let post of posts" [post]="post"></post-card>
    </div>

    <div class="empty-state" *ngIf="posts.length === 0 && !isLoading">
        <mat-icon>campaign</mat-icon>
        <h2>No Announcements</h2>
        <p>There are no announcements at the moment. Check back later for important community updates.</p>
    </div>
</div>
