<div class="post-container">
    <div class="button-container">
        <add-button 
            (buttonClick)="openCreateEventDialog()">
            Add new event
        </add-button>
    </div>

    <div class="posts-list">
        <post-card *ngFor="let post of posts" [post]="post"></post-card>
    </div>

    <p *ngIf="posts.length === 0 && !isLoading">No events for you</p>
</div>
