<div class="post-container">
    <div class="button-container" *ngIf="canCreatePoll">
        <add-button 
            (buttonClick)="openCreatePollDialog()">
            Add new poll
        </add-button>
    </div>

    <div class="polls-grid" *ngIf="!isLoading && polls.length > 0">
        <poll-card 
            *ngFor="let poll of polls" 
            [poll]="poll"
            [hasIssues]="hasIssues(poll.id)"
            [issuesCount]="getIssuesCount(poll.id)"
            (click)="openPollDetails(poll)"
            (issueClick)="openPollIssuesDialog(poll, $event)">
        </poll-card>
    </div>

    <div *ngIf="isLoading" class="loading-container">
        <p>Loading polls...</p>
    </div>

    <div class="empty-state" *ngIf="!isLoading && polls.length === 0">
        <mat-icon>how_to_vote</mat-icon>
        <h2>No Polls</h2>
        <p>There are no active polls at the moment. Polls allow community members to vote on important decisions.</p>
    </div>
</div>
